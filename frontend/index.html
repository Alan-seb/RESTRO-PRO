<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant MS — Login</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 40px; }
    .login-logo .icon { font-size: 3rem; display: block; }
    .login-logo h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; margin-top: 8px; }
    .login-logo p  { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
    .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 32px; box-shadow: var(--shadow); }
    .login-card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 24px; }
    .btn-login { width: 100%; justify-content: center; padding: 11px; font-size: 0.95rem; }
    .login-hint { margin-top: 16px; text-align: center; font-size: 0.8rem; color: var(--text-muted); background: var(--bg3); border-radius: 7px; padding: 10px; }
    .login-hint strong { color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="icon">🍽️</span>
      <h1>Restaurant MS</h1>
      <p>Restaurant Management System</p>
    </div>
    <div class="login-card">
      <h2>Sign in to your account</h2>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" value="admin@restaurant.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" value="admin123">
      </div>
      <button class="btn btn-primary btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="login-hint">
        Default: <strong>admin@restaurant.com</strong> / <strong>admin123</strong>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'pages/dashboard.html';

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      if (!email || !password) return Toast.error('Enter email and password');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const data = await Auth.login(email, password);
        localStorage.setItem('rms_token', data.token);
        localStorage.setItem('rms_user', JSON.stringify(data.user));
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        Toast.error(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
