<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Restaurant MS</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
renderLayout('menu.html');
const main = document.getElementById('main-content');
main.innerHTML = `
  <div class="page-header">
    <div><h1 class="page-title">Menu</h1><p class="page-subtitle">Manage your menu items & categories</p></div>
    <button class="btn btn-primary" onclick="openItemModal()">＋ Add Item</button>
  </div>
  <div class="filters-bar">
    <input class="form-control search-box" id="searchInput" placeholder="Search items…" oninput="filterItems()">
    <select class="form-control" style="width:180px" id="catFilter" onchange="filterItems()">
      <option value="">All Categories</option>
    </select>
    <select class="form-control" style="width:160px" id="availFilter" onchange="filterItems()">
      <option value="">All Items</option>
      <option value="true">Available</option>
      <option value="false">Unavailable</option>
    </select>
  </div>
  <div class="card">
    <div class="card-body" style="padding:0">
      <div class="table-wrap" id="menu-table"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
  </div>
  <div id="modal-area"></div>
`;

let allItems = [], categories = [];

async function loadMenu(){
  try{
    [allItems, categories] = await Promise.all([api.get('/menu'), api.get('/menu/categories')]);
    const sel = document.getElementById('catFilter');
    sel.innerHTML='<option value="">All Categories</option>'+
      categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    filterItems();
  }catch(e){Toast.error(e.message);}
}

function filterItems(){
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const av  = document.getElementById('availFilter').value;
  let items = allItems.filter(i=>{
    if(q   && !i.name.toLowerCase().includes(q) && !(i.description||'').toLowerCase().includes(q)) return false;
    if(cat && String(i.category_id)!==cat) return false;
    if(av  && String(i.available)!==av)    return false;
    return true;
  });
  renderMenu(items);
}

function renderMenu(items){
  const wrap = document.getElementById('menu-table');
  if(!items.length){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🍛</div><p>No menu items found</p></div>';
    return;
  }
  wrap.innerHTML=`<table>
    <thead><tr><th>Name</th><th>Category</th><th>Description</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${items.map(i=>`
      <tr>
        <td class="fw-600">${i.name}</td>
        <td>${i.category_name||'—'}</td>
        <td style="font-size:.82rem;color:var(--text-muted);max-width:220px">${i.description||'—'}</td>
        <td class="text-gold fw-600">${formatCurrency(i.price)}</td>
        <td><span class="badge ${i.available?'badge-available':'badge-cancelled'}">${i.available?'Available':'Off'}</span></td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick='openItemModal(${JSON.stringify(i)})'>Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem(${i.id})">Delete</button>
          </div>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

function openItemModal(item=null){
  showModal(item?'Edit Menu Item':'Add Menu Item',`
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Item Name *</label>
        <input class="form-control" id="iName" value="${item?.name||''}" placeholder="e.g. Butter Chicken">
      </div>
      <div class="form-group">
        <label class="form-label">Price (₹) *</label>
        <input class="form-control" id="iPrice" type="number" step="0.01" value="${item?.price||''}" placeholder="0.00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-control" id="iDesc" value="${item?.description||''}" placeholder="Short description…">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-control" id="iCat">
          <option value="">None</option>
          ${categories.map(c=>`<option value="${c.id}"${item?.category_id==c.id?' selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Available</label>
        <select class="form-control" id="iAvail">
          <option value="true"${item?.available!==false?' selected':''}>Yes</option>
          <option value="false"${item?.available===false?' selected':''}>No</option>
        </select>
      </div>
    </div>
  `,`<button class="btn btn-primary" onclick="saveItem(${item?.id||null})">Save</button>`);
}

async function saveItem(id){
  const body={
    name:document.getElementById('iName').value.trim(),
    price:parseFloat(document.getElementById('iPrice').value),
    description:document.getElementById('iDesc').value,
    category_id:document.getElementById('iCat').value||null,
    available:document.getElementById('iAvail').value==='true',
  };
  if(!body.name||!body.price) return Toast.error('Name and price are required');
  try{
    if(id) await api.put(`/menu/${id}`,body);
    else   await api.post('/menu',body);
    Toast.success('Menu item saved!');
    closeModal(); loadMenu();
  }catch(e){Toast.error(e.message);}
}

async function deleteItem(id){
  if(!confirm('Delete this menu item?')) return;
  try{
    await api.delete(`/menu/${id}`);
    Toast.success('Item deleted');
    loadMenu();
  }catch(e){Toast.error(e.message);}
}

function showModal(title,body,footer=''){
  document.getElementById('modal-area').innerHTML=`
    <div class="modal-backdrop" id="modalBackdrop" onclick="backdropClose(event)">
      <div class="modal">
        <div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">${body}</div>
        ${footer?`<div class="modal-footer">${footer}</div>`:''}
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-area').innerHTML='';}
function backdropClose(e){if(e.target.id==='modalBackdrop')closeModal();}

loadMenu();
</script>
</body>
</html>
