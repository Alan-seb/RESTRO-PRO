<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Restaurant MS</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
renderLayout('dashboard.html');

const main = document.getElementById('main-content');
main.innerHTML = `
  <div class="page-header">
    <div><h1 class="page-title">Dashboard</h1><p class="page-subtitle">Today's overview at a glance</p></div>
    <button class="btn btn-secondary" onclick="loadDashboard()">↻ Refresh</button>
  </div>
  <div class="stats-grid" id="stats-grid">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px" id="bottom-grid">
    <div class="card" id="recent-orders-card">
      <div class="card-header"><span class="card-title">Recent Orders</span><a href="orders.html" class="btn btn-secondary btn-sm">View All</a></div>
      <div class="card-body"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
    <div class="card" id="low-stock-card">
      <div class="card-header"><span class="card-title">⚠️ Low Stock Alerts</span><a href="inventory.html" class="btn btn-secondary btn-sm">Manage</a></div>
      <div class="card-body"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
  </div>
`;

async function loadDashboard() {
  try {
    const [orders, bills, tables, inventory] = await Promise.all([
      api.get('/orders'),
      api.get('/bills'),
      api.get('/tables'),
      api.get('/inventory/low-stock'),
    ]);

    const today = new Date().toDateString();
    const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
    const todayBills  = bills.filter(b => new Date(b.created_at).toDateString() === today);
    const todayRev    = todayBills.filter(b => b.payment_status === 'paid').reduce((s, b) => s + parseFloat(b.total), 0);
    const occupied    = tables.filter(t => t.status === 'occupied').length;
    const pending     = orders.filter(o => o.status === 'pending').length;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card" style="--accent:var(--gold)">
        <div class="stat-label">Today's Revenue</div>
        <div class="stat-value">${formatCurrency(todayRev)}</div>
        <div class="stat-meta">${todayBills.filter(b=>b.payment_status==='paid').length} paid bills</div>
      </div>
      <div class="stat-card" style="--accent:var(--blue)">
        <div class="stat-label">Today's Orders</div>
        <div class="stat-value">${todayOrders.length}</div>
        <div class="stat-meta">${pending} pending</div>
      </div>
      <div class="stat-card" style="--accent:var(--green)">
        <div class="stat-label">Tables Occupied</div>
        <div class="stat-value">${occupied} / ${tables.length}</div>
        <div class="stat-meta">${tables.filter(t=>t.status==='available').length} available</div>
      </div>
      <div class="stat-card" style="--accent:var(--red)">
        <div class="stat-label">Low Stock Items</div>
        <div class="stat-value">${inventory.length}</div>
        <div class="stat-meta">Items need restocking</div>
      </div>
    `;

    // Recent orders
    const recentBody = document.querySelector('#recent-orders-card .card-body');
    if (!orders.length) {
      recentBody.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>No orders yet</p></div>';
    } else {
      recentBody.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>#</th><th>Table</th><th>Type</th><th>Status</th><th>Time</th></tr></thead>
        <tbody>${orders.slice(0,8).map(o => `
          <tr>
            <td class="fw-600">#${o.id}</td>
            <td>${o.table_number || '—'}</td>
            <td>${o.order_type}</td>
            <td><span class="badge badge-${o.status}">${o.status}</span></td>
            <td class="text-muted" style="font-size:.8rem">${formatDate(o.created_at)}</td>
          </tr>`).join('')}
        </tbody></table></div>`;
    }

    // Low stock
    const lowBody = document.querySelector('#low-stock-card .card-body');
    if (!inventory.length) {
      lowBody.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>All stock levels OK</p></div>';
    } else {
      lowBody.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Qty</th><th>Min</th><th>Status</th></tr></thead>
        <tbody>${inventory.map(i => `
          <tr>
            <td class="fw-600">${i.item_name}</td>
            <td class="text-red fw-600">${i.quantity} ${i.unit}</td>
            <td class="text-muted">${i.min_threshold}</td>
            <td><span class="badge badge-low">Low</span></td>
          </tr>`).join('')}
        </tbody></table></div>`;
    }
  } catch (err) {
    Toast.error('Failed to load dashboard: ' + err.message);
  }
}

loadDashboard();
</script>
</body>
</html>
